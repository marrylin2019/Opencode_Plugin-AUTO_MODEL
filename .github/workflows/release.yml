name: Build and Release

on:
  push:
    tags:
      - 'v*' # 当推送以 'v' 开头的 tag 时触发，例如 v1.0.0

permissions:
  contents: write # 允许 Action 创建 Release 和上传产物

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build plugin
        # 确保你的项目根目录下有 src/index.ts，并严格按照要求使用该编译命令
        run: bun build src/index.ts --outfile=auto-models.js --target node --external @opencode-ai/plugin

      - name: Create Release and Upload Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: auto-models.js
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
